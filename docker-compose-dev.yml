name: ${PROJECT_NAME}

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

x-restart-policy: &restart-policy
  restart: unless-stopped

x-common-env: &common-env
  TZ: ${TZ}
  ENV_NAME: ${ENV_NAME}

x-common-labels: &common-labels
  stack: ${PROJECT_NAME}
  env: ${ENV_NAME}

services:
  # Core
  mariadb:
    image: mariadb:11.4
    container_name: ${PROJECT_NAME}-mariadb
    labels:
      <<: *common-labels
      service.group: core
      service.lifecycle: active
    environment:
      <<: *common-env
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${APP_DB_NAME}
      MARIADB_USER: ${MARIADB_USER}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
      APP_DB_NAME: ${APP_DB_NAME}
      ITOP_DB_NAME: ${ITOP_DB_NAME}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "${MARIADB_PORT}:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ${SETTINGS_ROOT}/mariadb/init:/docker-entrypoint-initdb.d:ro
      - ${SETTINGS_ROOT}/mariadb:/opt/mariadb-tools:ro
      - ${LOGS_ROOT}/mariadb:/var/log/mysql
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "127.0.0.1", "-u${MARIADB_USER}", "-p${MARIADB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - internal
    logging: *default-logging
    <<: *restart-policy

  redis:
    image: redis:7-alpine
    container_name: ${PROJECT_NAME}-redis
    labels:
      <<: *common-labels
      service.group: core
      service.lifecycle: active
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    environment:
      <<: *common-env
    volumes:
      - ${DATA_ROOT}/redis_data:/data
      - ${SETTINGS_ROOT}/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - ${LOGS_ROOT}/redis:/var/log/redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 30
    networks:
      - internal
    logging: *default-logging
    <<: *restart-policy

  backend:
    build:
      context: .
      dockerfile: ./docker/dev/Dockerfile.backend
    image: ${PROJECT_NAME}/backend:dev
    container_name: ${PROJECT_NAME}-backend
    labels:
      <<: *common-labels
      service.group: core
      service.lifecycle: active
    working_dir: /app
    environment:
      <<: *common-env
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      APP_DB_HOST: mariadb
      APP_DB_PORT: 3306
      APP_DB_NAME: ${APP_DB_NAME}
      APP_DB_USER: ${MARIADB_USER}
      APP_DB_PASSWORD: ${MARIADB_PASSWORD}
      ITOP_URL: http://itop
      ITOP_VERIFY_SSL: ${ITOP_VERIFY_SSL}
      ITOP_TIMEOUT_SECONDS: ${ITOP_TIMEOUT_SECONDS}
      ITOP_DB_HOST: mariadb
      ITOP_DB_PORT: 3306
      ITOP_DB_NAME: ${ITOP_DB_NAME}
      ITOP_DB_USER: ${MARIADB_USER}
      ITOP_DB_PASSWORD: ${MARIADB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: ${REDIS_DB}
      HUB_TOKEN_KEK: ${HUB_TOKEN_KEK}
      HUB_TOKEN_KEK_VERSION: ${HUB_TOKEN_KEK_VERSION}
      HUB_SESSION_TTL_SECONDS: ${HUB_SESSION_TTL_SECONDS}
      HUB_RUNTIME_TOKEN_TTL_SECONDS: ${HUB_RUNTIME_TOKEN_TTL_SECONDS}
      HUB_SESSION_WARNING_SECONDS: ${HUB_SESSION_WARNING_SECONDS}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL}
      PDF_WORKER_QUEUE: ${PDF_WORKER_QUEUE}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      PDQ_ENABLED: ${PDQ_ENABLED:-1}
      PDQ_SQLITE_DIR: ${PDQ_SQLITE_DIR:-/app/data/pdq}
      PDQ_SQLITE_FILE_NAME: ${PDQ_SQLITE_FILE_NAME:-}
      PDQ_SQLITE_FILE_GLOB: ${PDQ_SQLITE_FILE_GLOB:-*.db;*.sqlite;*.sqlite3}
      PDQ_SEARCH_MIN_CHARS: ${PDQ_SEARCH_MIN_CHARS:-2}
    volumes:
      - ${VOLUMES_ROOT}/backend/app:/app
      - ${DATA_ROOT}/backend_data:/app/data
      - ${PDQ_SHARED_ROOT:-./APP/data/dev/pdq}:${PDQ_SQLITE_DIR:-/app/data/pdq}:ro
      - ${LOGS_ROOT}/backend:/var/log/app
    command: >
      sh -c "if [ -f requirements.txt ]; then pip install --user --no-cache-dir -r requirements.txt; fi &&
      if [ -f pyproject.toml ]; then pip install --user --no-cache-dir -e .; fi &&
      if [ -f main.py ]; then uvicorn main:app --host 0.0.0.0 --port 8000 --reload;
      else tail -f /dev/null; fi"
    ports:
      - "${BACKEND_PORT}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s = socket.create_connection(('127.0.0.1', 8000), 2); s.close()"]
      interval: 15s
      timeout: 5s
      retries: 10
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
      itop:
        condition: service_started
      mailpit:
        condition: service_started
    networks:
      - internal
    logging: *default-logging
    <<: *restart-policy

  worker:
    build:
      context: .
      dockerfile: ./docker/dev/Dockerfile.worker
    image: ${PROJECT_NAME}/worker:dev
    container_name: ${PROJECT_NAME}-worker
    labels:
      <<: *common-labels
      service.group: core
      service.lifecycle: active
    working_dir: /app
    environment:
      <<: *common-env
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: ${REDIS_DB}
      BACKEND_INTERNAL_URL: http://backend:8000
      MAIL_HOST: ${SMTP_HOST}
      MAIL_PORT: ${SMTP_PORT}
      PDF_WORKER_QUEUE: ${PDF_WORKER_QUEUE}
      WORKER_HEARTBEAT_SECONDS: ${WORKER_HEARTBEAT_SECONDS}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
    volumes:
      - ${VOLUMES_ROOT}/worker/app:/app
      - ${SETTINGS_ROOT}/worker/temp:/app/assets/temp
      - ${LOGS_ROOT}/worker:/var/log/app
    command: >
      sh -c "if [ -f requirements.txt ]; then pip install --user --no-cache-dir -r requirements.txt; fi &&
      if [ -f worker.py ]; then watchmedo auto-restart --patterns='*.py' --recursive -- python worker.py;
      else tail -f /dev/null; fi"
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - internal
    logging: *default-logging
    <<: *restart-policy

  pdf-worker:
    build:
      context: .
      dockerfile: ./docker/dev/Dockerfile.pdf-worker
    image: ${PROJECT_NAME}/pdf-worker:dev
    container_name: ${PROJECT_NAME}-pdf-worker
    labels:
      <<: *common-labels
      service.group: core
      service.lifecycle: active
    working_dir: /app
    environment:
      <<: *common-env
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: ${REDIS_DB}
      BACKEND_INTERNAL_URL: http://backend:8000
      GOTENBERG_URL: http://gotenberg:3000
      PDF_STORAGE_DIR: /app/output
      PDF_WORKER_HEARTBEAT_SECONDS: ${PDF_WORKER_HEARTBEAT_SECONDS}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
    volumes:
      - ${VOLUMES_ROOT}/pdf-worker/app:/app
      - ${LOGS_ROOT}/pdf-worker:/var/log/app
    command: >
      sh -c "if [ -f requirements.txt ]; then pip install --user --no-cache-dir -r requirements.txt; fi &&
      if [ -f main.py ]; then watchmedo auto-restart --patterns='*.py;*.html' --recursive -- python main.py;
      else tail -f /dev/null; fi"
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
      gotenberg:
        condition: service_started
    networks:
      - internal
    logging: *default-logging
    <<: *restart-policy

  frontend:
    build:
      context: .
      dockerfile: ./docker/dev/Dockerfile.frontend
    image: ${PROJECT_NAME}/frontend:dev
    container_name: ${PROJECT_NAME}-frontend
    labels:
      <<: *common-labels
      service.group: core
      service.lifecycle: active
    working_dir: /app
    environment:
      <<: *common-env
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      VITE_APP_NAME: ${VITE_APP_NAME}
      VITE_API_URL: ${VITE_API_URL}
      VITE_ITOP_URL: ${VITE_ITOP_URL}
    volumes:
      - ${VOLUMES_ROOT}/frontend:/app
      - frontend_node_modules:/app/node_modules
      - ${LOGS_ROOT}/frontend:/var/log/app
    command: ["/usr/local/bin/frontend-entrypoint.sh"]
    ports:
      - "${FRONTEND_PORT}:5173"
    depends_on:
      - backend
      - itop
    networks:
      - internal
    logging: *default-logging
    <<: *restart-policy

  gotenberg:
    image: gotenberg/gotenberg:8
    container_name: ${PROJECT_NAME}-gotenberg
    labels:
      <<: *common-labels
      service.group: core
      service.lifecycle: active
    command:
      - gotenberg
      - --chromium-disable-javascript=true
    networks:
      - internal
    logging: *default-logging
    <<: *restart-policy

  nginx:
    image: nginx:1.25-alpine
    container_name: ${PROJECT_NAME}-nginx
    entrypoint: ["nginx", "-g", "daemon off;"]
    labels:
      <<: *common-labels
      service.group: core
      service.lifecycle: active
    depends_on:
      - frontend
      - backend
      - itop
    ports:
      - "${NGINX_HTTP_PORT}:80"
    volumes:
      - ${SETTINGS_ROOT}/nginx/conf.d:/etc/nginx/conf.d:ro
      - ${SETTINGS_ROOT}/nginx/certs:/etc/nginx/certs:ro
      - ${LOGS_ROOT}/nginx:/var/log/nginx
    networks:
      - internal
    logging: *default-logging
    <<: *restart-policy

  # Dependencia temporal de desarrollo
  itop:
    build:
      context: .
      dockerfile: ./docker/dev/Dockerfile.itop
      args:
        ITOP_PHP_BASE_IMAGE: ${ITOP_PHP_BASE_IMAGE}
    image: ${PROJECT_NAME}/itop:dev
    container_name: ${PROJECT_NAME}-itop
    labels:
      <<: *common-labels
      service.group: dependency
      service.lifecycle: dev-temporary
    environment:
      <<: *common-env
      ITOP_DB_HOST: mariadb
      ITOP_DB_PORT: 3306
      ITOP_DB_NAME: ${ITOP_DB_NAME}
      ITOP_DB_USER: ${MARIADB_USER}
      ITOP_DB_PASSWORD: ${MARIADB_PASSWORD}
      ITOP_ADMIN_USER: ${ITOP_ADMIN_USER}
      ITOP_ADMIN_PASSWORD: ${ITOP_ADMIN_PASSWORD}
      ITOP_PACKAGE_VERSION: ${ITOP_PACKAGE_VERSION}
      ITOP_PACKAGE_URL: ${ITOP_PACKAGE_URL}
      ITOP_INSTALL_FORCE: ${ITOP_INSTALL_FORCE}
      ITOP_AUTO_INSTALL_IF_EMPTY: ${ITOP_AUTO_INSTALL_IF_EMPTY}
    depends_on:
      mariadb:
        condition: service_healthy
    ports:
      - "${ITOP_PORT}:80"
    volumes:
      - itop_data:/var/www/html
      - ${SETTINGS_ROOT}/itop-installer:/opt/itop-installer:ro
      - ${LOGS_ROOT}/itop:/var/log/apache2
    networks:
      - internal
    logging: *default-logging
    <<: *restart-policy

  # Herramientas de soporte
  mailpit:
    image: axllent/mailpit:v1.29
    container_name: ${PROJECT_NAME}-mailpit
    labels:
      <<: *common-labels
      service.group: tools
      service.lifecycle: dev-qa-only
    environment:
      <<: *common-env
    ports:
      - "${MAILPIT_UI_PORT}:8025"
      - "${MAILPIT_SMTP_PORT}:1025"
    networks:
      - internal
    logging: *default-logging
    <<: *restart-policy

  redisinsight:
    image: ${REDISINSIGHT_IMAGE}
    container_name: ${PROJECT_NAME}-redisinsight
    profiles: ["tools"]
    labels:
      <<: *common-labels
      service.group: tools
      service.lifecycle: dev-qa-only
    ports:
      - "${REDISINSIGHT_PORT}:5540"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - internal
    logging: *default-logging
    <<: *restart-policy

networks:
  internal:
    driver: bridge
    name: ${PROJECT_NAME}_internal

volumes:
  mariadb_data:
    name: ${PROJECT_NAME}_mariadb_data
  frontend_node_modules:
    name: ${PROJECT_NAME}_frontend_node_modules
  itop_data:
    name: ${PROJECT_NAME}_itop_data
