# QA scaffold diferido.
# Este archivo no es la referencia activa del proyecto en la fase actual.
# Antes de usarlo como entorno QA real debe alinearse con la arquitectura vigente de dev.
name: ${PROJECT_NAME}

x-common-labels: &common-labels
  stack: ${PROJECT_NAME}
  env: ${ENV_NAME}

services:
  mariadb:
    image: mariadb:11.4
    container_name: ${PROJECT_NAME}-mariadb
    restart: unless-stopped
    labels:
      <<: *common-labels
      service.group: core
      service.lifecycle: deferred-qa
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${APP_DB_NAME}
      MARIADB_USER: ${MARIADB_USER}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
    volumes:
      - ./APP/data/qa/mariadb_data:/var/lib/mysql
      - ./APP/config/mariadb/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "${MARIADB_PORT}:3306"
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "127.0.0.1", "-u${MARIADB_USER}", "-p${MARIADB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: ${PROJECT_NAME}-redis
    restart: unless-stopped
    labels:
      <<: *common-labels
      service.group: core
      service.lifecycle: deferred-qa
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    volumes:
      - ./APP/data/qa/redis_data:/data
      - ./APP/config/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    ports:
      - "${REDIS_PORT}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 30

  backend:
    build:
      context: .
      dockerfile: ./docker/prod/Dockerfile.backend
    container_name: ${PROJECT_NAME}-backend
    restart: unless-stopped
    labels:
      <<: *common-labels
      service.group: core
      service.lifecycle: deferred-qa
    environment:
      ENV_NAME: ${ENV_NAME}
      APP_DB_HOST: mariadb
      APP_DB_PORT: 3306
      APP_DB_NAME: ${APP_DB_NAME}
      APP_DB_USER: ${MARIADB_USER}
      APP_DB_PASSWORD: ${MARIADB_PASSWORD}
      ITOP_URL: ${ITOP_URL}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: ${REDIS_DB}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL}
      PDF_WORKER_QUEUE: ${PDF_WORKER_QUEUE}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
      JWT_SECRET: ${JWT_SECRET}
    volumes:
      - ./APP/volumes/backend/app:/app
      - ./APP/data/qa/backend_data:/app/_data
    ports:
      - "${BACKEND_PORT}:8000"
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: ./docker/prod/Dockerfile.worker
    container_name: ${PROJECT_NAME}-worker
    restart: unless-stopped
    labels:
      <<: *common-labels
      service.group: core
      service.lifecycle: deferred-qa
    environment:
      ENV_NAME: ${ENV_NAME}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: ${REDIS_DB}
      BACKEND_INTERNAL_URL: http://backend:8000
      MAIL_HOST: ${SMTP_HOST}
      MAIL_PORT: ${SMTP_PORT}
      PDF_WORKER_QUEUE: ${PDF_WORKER_QUEUE}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
    volumes:
      - ./APP/volumes/worker/app:/app
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_started

  pdf-worker:
    build:
      context: .
      dockerfile: ./docker/prod/Dockerfile.pdf-worker
    container_name: ${PROJECT_NAME}-pdf-worker
    restart: unless-stopped
    labels:
      <<: *common-labels
      service.group: core
      service.lifecycle: deferred-qa
    environment:
      ENV_NAME: ${ENV_NAME}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: ${REDIS_DB}
      BACKEND_INTERNAL_URL: http://backend:8000
      GOTENBERG_URL: http://gotenberg:3000
      PDF_STORAGE_DIR: /app/output
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
    volumes:
      - ./APP/volumes/pdf-worker/app:/app
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_started
      gotenberg:
        condition: service_started

  frontend:
    build:
      context: .
      dockerfile: ./docker/prod/Dockerfile.frontend
    container_name: ${PROJECT_NAME}-frontend
    restart: unless-stopped
    labels:
      <<: *common-labels
      service.group: core
      service.lifecycle: deferred-qa

  gotenberg:
    image: gotenberg/gotenberg:8
    container_name: ${PROJECT_NAME}-gotenberg
    restart: unless-stopped
    labels:
      <<: *common-labels
      service.group: core
      service.lifecycle: deferred-qa
    command:
      - gotenberg
      - --chromium-disable-javascript=true

  nginx:
    image: nginx:1.25-alpine
    container_name: ${PROJECT_NAME}-nginx
    restart: unless-stopped
    labels:
      <<: *common-labels
      service.group: core
      service.lifecycle: deferred-qa
    depends_on:
      - frontend
      - backend
    ports:
      - "${NGINX_HTTP_PORT}:80"
    volumes:
      - ./APP/config/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./APP/config/nginx/certs:/etc/nginx/certs:ro

  mailpit:
    image: axllent/mailpit:v1.29
    container_name: ${PROJECT_NAME}-mailpit
    restart: unless-stopped
    labels:
      <<: *common-labels
      service.group: tooling
      service.lifecycle: dev-qa-only
    ports:
      - "${MAILPIT_UI_PORT}:8025"
      - "${MAILPIT_SMTP_PORT}:1025"

  redisinsight:
    image: ${REDISINSIGHT_IMAGE}
    container_name: ${PROJECT_NAME}-redisinsight
    profiles: ["tools"]
    restart: unless-stopped
    labels:
      <<: *common-labels
      service.group: tooling
      service.lifecycle: dev-qa-only
    ports:
      - "${REDISINSIGHT_PORT}:5540"
    depends_on:
      redis:
        condition: service_healthy
