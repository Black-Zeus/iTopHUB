server {
    listen 80;
    server_name _;
    absolute_redirect off;
    port_in_redirect off;
    root /usr/share/nginx/html;
    index index.html;

    location = /health {
        access_log off;
        return 200 "ok\n";
    }

    location = /itop-hub {
        return 302 /itop-hub/;
    }

    location /itop-hub/ {
        try_files $uri $uri/ /itop-hub/index.html;
    }

    location = /itop-hub/index.html {
        add_header Cache-Control "no-cache, must-revalidate";
        try_files $uri =404;
    }
}
